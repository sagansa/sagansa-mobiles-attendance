<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <!-- Background gradient: deep maroon -->
    <radialGradient id="bg" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#9B2226"/>
      <stop offset="60%" stop-color="#7A1A1E"/>
      <stop offset="100%" stop-color="#5A1014"/>
    </radialGradient>
    <!-- Gold gradient for emblem -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F4D58D"/>
      <stop offset="50%" stop-color="#E9B44C"/>
      <stop offset="100%" stop-color="#C8902F"/>
    </linearGradient>
    <!-- Subtle parang motif pattern -->
    <pattern id="parang" x="0" y="0" width="120" height="120" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="120" height="120" fill="none"/>
      <path d="M0 0 L60 0 L120 60 L120 120 L60 120 L0 60 Z" fill="none" stroke="#E9B44C" stroke-width="2" opacity="0.06"/>
      <path d="M0 40 L80 40 L120 80" fill="none" stroke="#F4E5C2" stroke-width="1.5" opacity="0.05"/>
    </pattern>
    <!-- Soft inner vignette -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="60%">
      <stop offset="70%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.35"/>
    </radialGradient>
    <!-- Clip for rounded square -->
    <clipPath id="rounded">
      <rect x="0" y="0" width="1024" height="1024" rx="225" ry="225"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <g clip-path="url(#rounded)">
    <rect width="1024" height="1024" fill="url(#bg)"/>
    <rect width="1024" height="1024" fill="url(#parang)"/>
    <rect width="1024" height="1024" fill="url(#vignette)"/>
  </g>

  <!-- Emblem: stylized "S" monogram with attendance check motif -->
  <g transform="translate(512 512)">
    <!-- Outer ring (gold) -->
    <circle r="300" fill="none" stroke="url(#gold)" stroke-width="14" opacity="0.9"/>
    <!-- Inner disc -->
    <circle r="266" fill="#5A1014" opacity="0.55"/>

    <!-- Monogram S formed from a check-in motion (clock arc + check) -->
    <!-- S path -->
    <path d="
      M -120 -40
      C -120 -150, -40 -190, 40 -160
      C 110 -135, 130 -70, 70 -30
      C 30 -5, -30 10, -70 40
      C -130 80, -110 150, -40 175
      C 40 200, 120 160, 120 60"
      fill="none" stroke="url(#gold)" stroke-width="58" stroke-linecap="round"/>

    <!-- Attendance check mark overlaid -->
    <path d="M -8 18 L 42 78 L 130 -50"
          fill="none" stroke="#F4E5C2" stroke-width="40" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>

    <!-- Small dot accents (clock-in markers) -->
    <circle cx="120" cy="-160" r="14" fill="#F4D58D"/>
    <circle cx="-120" cy="175" r="14" fill="#F4D58D"/>
  </g>
</svg>
