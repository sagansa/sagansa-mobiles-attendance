<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!--
    Adaptive icon FOREGROUND only.
    Background is solid color set in app.json (adaptiveIcon.backgroundColor = #9B2226).
    Safe zone: keep content within central ~66% (diameter ~680px) — Android may mask
    the outer ~33% depending on device (circle, squircle, rounded square).
    Here we use a transparent canvas and center the emblem.
  -->
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F4D58D"/>
      <stop offset="50%" stop-color="#E9B44C"/>
      <stop offset="100%" stop-color="#C8902F"/>
    </linearGradient>
  </defs>

  <!-- Transparent background (so app.json backgroundColor shows through) -->
  <rect width="1024" height="1024" fill="none"/>

  <g transform="translate(512 512)">
    <!-- Outer ring -->
    <circle r="300" fill="none" stroke="url(#gold)" stroke-width="16" opacity="0.9"/>

    <!-- Monogram S -->
    <path d="
      M -120 -40
      C -120 -150, -40 -190, 40 -160
      C 110 -135, 130 -70, 70 -30
      C 30 -5, -30 10, -70 40
      C -130 80, -110 150, -40 175
      C 40 200, 120 160, 120 60"
      fill="none" stroke="url(#gold)" stroke-width="62" stroke-linecap="round"/>

    <!-- Check mark -->
    <path d="M -8 18 L 42 78 L 130 -50"
          fill="none" stroke="#F4E5C2" stroke-width="42" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Accent dots -->
    <circle cx="120" cy="-160" r="15" fill="#F4D58D"/>
    <circle cx="-120" cy="175" r="15" fill="#F4D58D"/>
  </g>
</svg>
